<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Studio Pixel — AI Design Studio Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg0:#070b1e; --bg1:#0b1130; --surface:#101a40; --surface2:#0c1433;
    --ink:#eaf0ff; --ink2:#8b95d6;
    --pink:#ff5db1; --blue:#41d0ff; --teal:#2ff0d6; --green:#5cf08a;
    --amber:#ffd56b; --coral:#ff5d8a; --violet:#b388ff;
    --line:#26326a; --card:#111b46; --card2:#0e1639;
    --shadow:0 8px 24px rgba(0,0,0,.45);
    --good:#2ff0a0; --warn:#ffd56b; --bad:#ff5d7a;
    --hi:#ff5d8a; --med:#ffd56b; --lo:#41d0ff;
    --glow:0 0 14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Nunito',system-ui,sans-serif;
    background:
      radial-gradient(1100px 560px at 78% -8%, rgba(65,208,255,.10), transparent),
      radial-gradient(900px 500px at 10% 110%, rgba(179,136,255,.10), transparent),
      linear-gradient(160deg,#0a1030,#070b1e);
    color:var(--ink); overflow:hidden;
  }
  .pixel{font-family:'Press Start 2P',monospace}
  .app{display:grid;grid-template-rows:auto 1fr;height:100vh}

  /* ---------- Top bar ---------- */
  .topbar{
    display:flex;align-items:center;gap:11px;padding:10px 14px;
    background:linear-gradient(180deg,#0e1640,#0a1030);
    border-bottom:1px solid var(--line); box-shadow:0 2px 18px rgba(0,0,0,.4);
    z-index:30;
  }
  .brand{display:flex;align-items:center;gap:12px;min-width:0;flex-shrink:0}
  .logo{
    width:42px;height:42px;border-radius:11px;display:grid;place-items:center;
    background:linear-gradient(135deg,#ff5db1,#b388ff);
    box-shadow:0 0 18px rgba(255,93,177,.55);
    font-size:9px;color:#fff;text-shadow:0 0 6px rgba(0,0,0,.4)
  }
  .brand h1{font-size:12px;letter-spacing:.5px;color:#fff;text-shadow:0 0 10px rgba(65,208,255,.5)}
  .brand p{font-size:11px;color:var(--ink2);font-weight:700;margin-top:3px}
  .kpis{display:flex;gap:6px;flex:1;min-width:0;overflow-x:auto;overflow-y:hidden;scrollbar-width:none}
  .kpis::-webkit-scrollbar{display:none}
  .kpi{
    background:var(--card);border:1px solid var(--line);border-radius:13px;
    padding:6px 7px;display:flex;flex-direction:column;gap:2px;min-width:72px;flex-shrink:0;
    box-shadow:inset 0 0 18px rgba(65,208,255,.05)
  }
  .kpi .lbl{font-size:8.5px;font-weight:800;color:var(--ink2);text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
  .kpi .val{font-size:16px;font-weight:900;line-height:1;text-shadow:0 0 10px currentColor;white-space:nowrap}
  .kpi .val small{font-size:10px;color:var(--ink2);font-weight:800}
  .health{display:flex;align-items:center;gap:10px}
  .health .ring{width:46px;height:46px;filter:drop-shadow(0 0 6px rgba(47,240,160,.5))}
  .clock{font-size:11px;font-weight:800;color:var(--ink2);text-align:right;min-width:120px;display:flex;flex-direction:column;align-items:flex-end}
  .clock .pixel{font-size:11px;color:var(--teal);text-shadow:0 0 8px rgba(47,240,214,.6)}
  .speed{display:flex;gap:4px;align-items:center}
  .speed button{
    font-family:'Press Start 2P';font-size:8px;border:1px solid var(--line);
    background:var(--card);border-radius:8px;padding:7px 8px;cursor:pointer;color:var(--ink2)
  }
  .speed button.on{background:var(--teal);color:#04121a;border-color:var(--teal);box-shadow:0 0 12px rgba(47,240,214,.6)}
  .liveBtn{font-family:'Press Start 2P';font-size:8px;border:1px solid var(--line);background:var(--card);color:var(--ink2);border-radius:10px;padding:9px 11px;cursor:default;display:flex;align-items:center;gap:7px;white-space:nowrap}
  .liveBtn .ld{width:8px;height:8px;border-radius:50%;background:#5b669e;box-shadow:0 0 6px currentColor}
  .liveBtn.on{color:#04121a;background:var(--violet);border-color:var(--violet);box-shadow:0 0 14px rgba(179,136,255,.6)}
  .liveBtn.on .ld{background:#1c1030}
  .liveBtn.err{color:var(--bad);border-color:var(--bad)}
  .liveBtn.err .ld{background:var(--bad)}
  .appBeat{font-family:'Press Start 2P';font-size:8px;border:1px solid #2ff0a0;color:#2ff0a0;background:rgba(47,240,160,.12);border-radius:10px;padding:9px 11px;display:flex;align-items:center;gap:7px;white-space:nowrap;flex-shrink:0}
  .appBeat .bd{width:8px;height:8px;border-radius:50%;background:#2ff0a0;box-shadow:0 0 6px #2ff0a0;animation:beatPulse 1.1s infinite}
  @keyframes beatPulse{0%,100%{opacity:1}50%{opacity:.25}}
  /* Kanban button + alert badge */
  .kanBtn{position:relative;font-family:'Press Start 2P';font-size:8px;border:1px solid var(--line);background:var(--card);color:#cdd6ff;border-radius:10px;padding:9px 11px;cursor:pointer;white-space:nowrap}
  .kanBtn:hover{border-color:var(--violet);color:#fff;box-shadow:0 0 12px rgba(179,136,255,.4)}
  .kanBtn.off{border-color:#2ff0a0;color:#2ff0a0}
  .kanBtn.snd-on{border-color:#2ff0a0;color:#2ff0a0;box-shadow:0 0 10px rgba(47,240,160,.4)}
  #dutyBtn:hover{border-color:#ff4d6d;color:#ff4d6d;box-shadow:0 0 12px rgba(255,77,109,.45)}
  #dutyBtn.off:hover{border-color:#2ff0a0;color:#2ff0a0;box-shadow:0 0 12px rgba(47,240,160,.4)}
  .kanAlert{position:absolute;top:-7px;right:-7px;min-width:18px;height:18px;padding:0 4px;border-radius:9px;background:#ff4d6d;color:#fff;font-family:Nunito;font-size:11px;font-weight:900;display:grid;place-items:center;box-shadow:0 0 10px rgba(255,77,109,.8);animation:alertpulse 1s ease-in-out infinite}
  @keyframes alertpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}
  /* Kanban fullscreen board */
  .kanWrap{position:fixed;inset:0;z-index:120;background:rgba(4,7,20,.9);backdrop-filter:blur(6px);display:flex;flex-direction:column;animation:fadein .2s ease}
  .kanHead{display:flex;align-items:center;gap:14px;padding:16px 22px;border-bottom:1px solid var(--line)}
  .kanHead h2{font-family:'Press Start 2P';font-size:13px;color:#fff;text-shadow:0 0 10px rgba(65,208,255,.5)}
  .kanHead .sub{color:var(--ink2);font-size:12px;font-weight:700}
  .kanDateBar{display:flex;align-items:center;gap:8px}
  .kanDateBar input[type=date]{background:rgba(13,19,48,.9);border:1px solid var(--line);color:#eaf0ff;border-radius:9px;padding:6px 10px;font:inherit;font-size:12px;font-weight:800;color-scheme:dark;cursor:pointer}
  .kanDateBar input[type=date]:hover{border-color:#41d0ff}
  .kanNav{background:rgba(13,19,48,.9);border:1px solid var(--line);color:#cdd6ff;width:30px;height:30px;border-radius:9px;font-size:18px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .kanNav:hover:not(:disabled){border-color:#41d0ff;color:#fff}
  .kanNav:disabled{opacity:.3;cursor:not-allowed}
  .kanBanner{margin-left:auto;display:none;align-items:center;gap:8px;background:rgba(255,77,109,.16);border:1px solid #ff4d6d;color:#ffd0d8;border-radius:10px;padding:7px 12px;font-weight:800;font-size:12px}
  .kanSummary{display:flex;gap:10px;padding:14px 22px 0;flex-wrap:wrap}
  .kanSum{display:flex;align-items:center;gap:9px;background:rgba(13,19,48,.6);border:1px solid var(--line);border-radius:12px;padding:8px 13px;flex:1;min-width:175px;cursor:pointer;transition:border-color .15s,opacity .15s,transform .1s}
  .kanSum:hover{border-color:#41d0ff;transform:translateY(-1px)}
  .kanSum.active{border-color:#2ff0a0;box-shadow:0 0 0 1px #2ff0a0,0 0 12px rgba(47,240,160,.35);background:rgba(47,240,160,.08)}
  .kanSum.active .ks-nm{color:#2ff0a0}
  .kanSum.dim{opacity:.45}
  .kanSum img{width:34px;height:34px;border-radius:8px;object-fit:cover;background:#0d1330;flex:none}
  .kanSum .ks-nm{font-weight:900;font-size:12px;color:#eaf0ff}
  .kanSum .ks-counts{display:flex;gap:9px;font-size:11px;font-weight:800;margin-top:3px}
  .kanSum .ks-counts .kw{color:#ff8aa0}.kanSum .ks-counts .kg{color:#5cf08a}.kanSum .ks-counts .kd{color:#54d6b0}
  .kanSum .ks-tok{margin-left:auto;font-size:12px;font-weight:900;color:#ffd56b;white-space:nowrap}
  .kanCols{flex:1;display:grid;grid-template-columns:repeat(3,1fr);gap:16px;padding:18px 22px;overflow:auto}
  .kanCol{background:rgba(13,19,48,.6);border:1px solid var(--line);border-radius:14px;padding:12px;display:flex;flex-direction:column;gap:10px;min-height:0;overflow:auto}
  .kanCol.disabled{opacity:.4;filter:grayscale(.7);background:rgba(13,19,48,.3);border-style:dashed}
  .kanColH{font-weight:900;font-size:13px;color:#eaf0ff;display:flex;align-items:center;gap:8px;position:sticky;top:0}
  .kanColH .cnt{margin-left:auto;font-size:11px;color:var(--ink2);background:#0a1230;border:1px solid var(--line);border-radius:8px;padding:2px 8px}
  .kanCard{background:linear-gradient(180deg,#15205180,#0d1330);border:1px solid var(--line);border-left-width:4px;border-radius:12px;padding:11px 12px}
  .kanCard .who{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .kanCard .who img{width:26px;height:26px;border-radius:7px;background:#0e1740;object-fit:contain}
  .kanCard .who b{font-size:12px;color:#fff}
  .kanCard .who .role{font-size:10px;color:var(--ink2);font-weight:700}
  .kanCard .desc{font-size:12px;color:#dbe2ff;line-height:1.4;margin-bottom:8px;max-height:54px;overflow:hidden}
  .kanCard .desc .taskLbl{color:#8b95d6;font-weight:800}
  .kanProj{display:inline-block;max-width:100%;font-size:11px;font-weight:800;color:#9fe0ff;background:#0e1f3a;border:1px solid #29406b;border-radius:7px;padding:3px 8px;margin-bottom:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;vertical-align:bottom}
  .kanCard .tool{font-size:10px;color:#9fb0e8;font-family:ui-monospace,monospace;margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .kanCard .usg{font-size:10px;font-weight:800;color:#7be0c0;margin-bottom:8px}
  .kanCard .barwrap{height:7px;background:#0a1230;border-radius:5px;overflow:hidden;margin-bottom:5px}
  .kanCard .bar{height:100%;border-radius:5px}
  .kanCard .bar.indet{width:38%;animation:scan 1.3s linear infinite}
  @keyframes scan{0%{margin-left:-38%}100%{margin-left:100%}}
  .kanCard .foot{display:flex;justify-content:space-between;font-size:10px;color:var(--ink2);font-weight:700}
  .kanCard.s-working{border-left-color:#5cf08a}
  .kanCard.s-idle{border-left-color:#5b669e;opacity:.82}
  .kanCard.s-done{border-left-color:#54d6b0;opacity:.9}
  .kanCard.s-waiting{border-left-color:#ff4d6d;box-shadow:0 0 18px rgba(255,77,109,.35);animation:waitpulse 1.4s ease-in-out infinite}
  @keyframes waitpulse{0%,100%{box-shadow:0 0 12px rgba(255,77,109,.25)}50%{box-shadow:0 0 24px rgba(255,77,109,.6)}}
  .kanCard .allowTag{display:inline-flex;align-items:center;gap:5px;background:#ff4d6d;color:#fff;font-weight:900;font-size:11px;border-radius:7px;padding:3px 8px;margin-bottom:7px}
  .kanEmpty{color:var(--ink2);font-size:12px;text-align:center;padding:18px;font-style:italic}
  /* Claude Usage modal (app-style) */
  .uHd{font-family:'Press Start 2P';font-size:12px;color:#fff;margin-bottom:2px}
  .uHd .plan{font-family:Nunito;font-size:11px;color:var(--ink2);font-weight:800;margin-left:8px;background:#0d1536;border:1px solid var(--line);border-radius:7px;padding:2px 8px}
  .uSec{font-size:11px;font-weight:900;letter-spacing:.4px;color:#9fb0e8;text-transform:uppercase;margin:18px 0 8px}
  .uRow{margin-bottom:14px}
  .uRow .top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
  .uRow .nm{font-size:13px;font-weight:800;color:#eaf0ff}
  .uRow .rs{font-size:11px;color:var(--ink2);font-weight:700}
  .uRow .pc{font-size:13px;font-weight:900}
  .uBar{height:9px;background:#0a1230;border-radius:6px;overflow:hidden}
  .uBar i{display:block;height:100%;border-radius:6px;transition:width .4s ease}
  .uUpdated{font-size:11px;color:var(--ink2);margin-top:14px}
  .uNote{font-size:11px;color:var(--ink2);background:#0d1536;border:1px solid var(--line);border-radius:9px;padding:8px 10px;margin-top:14px;line-height:1.5}

  /* ---------- Layout ---------- */
  .main{display:grid;grid-template-columns:268px 1fr 360px;min-height:0}
  .col{min-height:0;display:flex;flex-direction:column}
  .panel-scroll{overflow:auto;scrollbar-width:thin}
  .panel-scroll::-webkit-scrollbar{width:8px}
  .panel-scroll::-webkit-scrollbar-thumb{background:#27336b;border-radius:8px}

  /* ---------- Left sidebar ---------- */
  .sidebar{background:linear-gradient(180deg,#0c1334,#0a1030);border-right:1px solid var(--line)}
  .side-head{padding:14px 14px 8px}
  .side-head .ttl{font-size:10px;letter-spacing:.5px;color:var(--blue);text-shadow:0 0 8px rgba(65,208,255,.5)}
  .search{margin-top:10px;position:relative}
  .search input{
    width:100%;padding:9px 10px 9px 30px;border:1px solid var(--line);border-radius:11px;
    background:#0b1330;font-family:'Nunito';font-weight:700;font-size:13px;color:var(--ink)
  }
  .search input::placeholder{color:#5b669e}
  .search svg{position:absolute;left:9px;top:9px;opacity:.6}
  .filters{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}
  .chip{
    font-size:11px;font-weight:800;padding:5px 9px;border-radius:20px;border:1px solid var(--line);
    background:#0d1536;cursor:pointer;color:var(--ink2)
  }
  .chip.on{background:var(--blue);color:#04121a;border-color:var(--blue);box-shadow:0 0 12px rgba(65,208,255,.5)}
  .agent-list{padding:8px 12px 16px;display:flex;flex-direction:column;gap:9px}
  .agent-card{
    background:var(--card);border:1px solid var(--line);border-radius:15px;padding:11px;
    cursor:pointer;transition:.15s;box-shadow:var(--shadow);position:relative;overflow:hidden
  }
  .agent-card:hover{transform:translateY(-2px);border-color:#3a4a93}
  .agent-card.off{opacity:.45;filter:grayscale(.7)}
  .off-panel{text-align:center;padding:54px 20px;color:var(--ink2)}
  .off-panel .off-emoji{font-size:46px;margin-bottom:12px;opacity:.8}
  .off-panel .off-ttl{font-family:'Press Start 2P';font-size:14px;color:#cdd6ff;margin-bottom:12px}
  .off-panel .off-sub{font-size:12px;line-height:1.7}
  .agent-card.off:hover{transform:none}
  .agent-card.sel{border-color:var(--coral);box-shadow:0 0 0 1px var(--coral),0 0 18px rgba(255,93,138,.4)}
  .agent-card .row{display:flex;align-items:center;gap:10px}
  .av{width:46px;height:46px;border-radius:12px;flex:none;object-fit:contain;object-position:center bottom;background:#0e1740;border:1px solid var(--line)}
  .agent-card .nm{font-size:13.5px;font-weight:900;line-height:1.1}
  .agent-card .rl{font-size:11px;font-weight:800;color:var(--ink2);margin-top:2px}
  .stat-dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle;box-shadow:0 0 7px currentColor}
  .agent-card .status{font-size:11px;font-weight:800;margin-top:8px;display:flex;align-items:center}
  .mini-bar{height:7px;border-radius:6px;background:#0a1230;margin-top:8px;overflow:hidden;border:1px solid var(--line)}
  .mini-bar i{display:block;height:100%;border-radius:6px;transition:width .4s;box-shadow:0 0 8px currentColor}
  .agent-card .meta{display:flex;justify-content:space-between;font-size:10px;font-weight:800;color:var(--ink2);margin-top:6px}
  .energy{display:flex;align-items:center;gap:4px}
  .energy .e-bar{width:42px;height:6px;border-radius:5px;background:#0a1230;overflow:hidden;border:1px solid var(--line)}
  .energy .e-bar i{display:block;height:100%}

  /* ---------- Center stage ---------- */
  .stage{position:relative;background:radial-gradient(900px 520px at 50% 36%,#0d1740,#070b1e)}
  #office{display:block;width:100%;height:100%;image-rendering:pixelated;image-rendering:crisp-edges}
  .stage-overlay{position:absolute;inset:0;pointer-events:none}
  .minimap{position:absolute;left:14px;bottom:14px;width:172px;border:1px solid rgba(47,240,160,.5);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.5);cursor:pointer;z-index:8;background:#070b1e;opacity:.9;transition:opacity .15s}
  .minimap:hover{opacity:1;border-color:#2ff0a0}
  .legend{
    position:absolute;left:14px;bottom:14px;display:flex;gap:8px;flex-wrap:wrap;max-width:60%;
    pointer-events:auto
  }
  .legend .lg{
    background:rgba(13,19,48,.86);border:1px solid var(--line);border-radius:10px;backdrop-filter:blur(4px);
    padding:5px 9px;font-size:10.5px;font-weight:800;display:flex;align-items:center;gap:6px;box-shadow:var(--shadow)
  }
  .legend .sw{width:11px;height:11px;border-radius:4px;box-shadow:0 0 8px currentColor}
  .stage-tag{
    position:absolute;top:14px;left:14px;background:rgba(13,19,48,.86);backdrop-filter:blur(4px);
    border:1px solid var(--line);border-radius:12px;padding:8px 12px;box-shadow:var(--shadow)
  }
  .assignbar{position:absolute;top:14px;left:50%;transform:translateX(-50%);display:flex;gap:6px;pointer-events:auto;background:rgba(13,19,48,.92);border:1px solid var(--line);border-radius:12px;padding:6px;backdrop-filter:blur(4px);box-shadow:var(--shadow)}
  .assignbar input{width:320px;max-width:38vw;background:#0b1330;border:1px solid var(--line);border-radius:8px;color:var(--ink);font-family:'Nunito';font-weight:700;font-size:12px;padding:8px 10px}
  .assignbar input::placeholder{color:#5b669e}
  .assignbar input:focus{outline:none;border-color:var(--amber);box-shadow:0 0 10px rgba(255,213,107,.3)}
  .assignbar button{font-family:'Press Start 2P';font-size:8px;background:var(--amber);color:#1c1030;border:none;border-radius:8px;padding:0 12px;cursor:pointer}
  .stage-tag .t{font-size:9px;letter-spacing:.5px;color:var(--violet);text-shadow:0 0 8px rgba(179,136,255,.6)}
  .stage-tag .s{font-size:11px;font-weight:800;color:var(--ink2);margin-top:5px}
  .toasts{position:absolute;top:14px;right:14px;display:flex;flex-direction:column;gap:8px;align-items:flex-end;pointer-events:none}
  .toast{
    background:rgba(16,24,60,.96);border:1px solid var(--line);border-left-width:5px;border-radius:12px;backdrop-filter:blur(4px);
    padding:9px 12px;font-size:12px;font-weight:800;box-shadow:var(--shadow);max-width:300px;
    animation:slidein .4s ease both;display:flex;gap:8px;align-items:center
  }
  .toast small{display:block;font-weight:700;color:var(--ink2);font-size:10.5px;margin-top:2px}
  @keyframes slidein{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}
  @keyframes fadeout{to{opacity:0;transform:translateX(20px)}}

  /* ---------- Right panel ---------- */
  .rightpanel{background:linear-gradient(180deg,#0c1334,#0a1030);border-left:1px solid var(--line)}
  .tabs{display:flex;gap:5px;padding:12px 12px 0}
  .tab{
    flex:1;text-align:center;font-size:10px;font-weight:900;padding:9px 4px;border-radius:11px 11px 0 0;
    border:1px solid var(--line);border-bottom:none;background:#0c1437;cursor:pointer;color:var(--ink2)
  }
  .tab.on{background:var(--card);color:var(--blue);text-shadow:0 0 8px rgba(65,208,255,.5)}
  .tab-body{flex:1;min-height:0;border-top:1px solid var(--line);background:var(--card)}
  .pad{padding:14px}
  .section-ttl{font-size:9px;letter-spacing:.5px;color:var(--ink2);margin:2px 0 9px;text-transform:uppercase}

  /* detail */
  .profile{display:flex;gap:12px;align-items:center}
  .profile canvas{width:78px;height:78px;border-radius:16px;image-rendering:pixelated;border:1px solid var(--line);background:linear-gradient(180deg,#0e1740,#0a1030);box-shadow:0 0 16px rgba(65,208,255,.15)}
  .profile .nm{font-size:16px;font-weight:900}
  .profile .rl{font-size:12px;font-weight:800;color:var(--ink2)}
  .badge{display:inline-block;font-size:10px;font-weight:900;padding:3px 8px;border-radius:20px;margin-top:6px}
  .cur-task{background:linear-gradient(135deg,#13205a,#161a4d);border:1px solid var(--line);border-radius:14px;padding:12px;margin-top:14px;box-shadow:inset 0 0 22px rgba(65,208,255,.07)}

<script>
/* ============================================================
   STUDIO PIXEL — AI Design Studio Command Center
   A pixel-art isometric office simulation + monitoring dashboard.
   The Sims × Stardew Valley × Jira × AI Workforce Management.
   ============================================================ */

/* ---------------- Canvas / iso setup ---------------- */
const cv = document.getElementById('office');
const ctx = cv.getContext('2d');
let dpr = 1, cw = 0, ch = 0;
let panX = 0, panY = 0;                              // user drag pan

/* ---- image-based isometric scene (chibi) ---- */
const ASSET = 'assets/';
const sceneImg = new Image(); sceneImg.src = ASSET + 'background/scene-full.png';
sceneImg.onload = () => resize();
const SPR = {};                                      // sprite cache: SPR['pixel-idle'] = Image
const POSES = ['idle','think','happy','down','up','side','typing','sleep','cheer'];
['pixel','cora','milo','butler'].forEach(c => POSES.forEach(p => { const im = new Image(); im.src = ASSET + 'characters/' + c + '-' + p + '.png'; SPR[c+'-'+p] = im; }));
let sx0 = 0, sy0 = 0, sw = 0, sh = 0, U = 120;       // scene rect on screen + agent unit (px)
function resize(){
  const r = cv.parentElement.getBoundingClientRect();
  dpr = Math.min(window.devicePixelRatio||1, 2);
  cw = r.width; ch = r.height;
  cv.width = cw*dpr; cv.height = ch*dpr;
  cv.style.width = cw+'px'; cv.style.height = ch+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.imageSmoothingEnabled = true;
  const ar = (sceneImg.width && sceneImg.height) ? sceneImg.width/sceneImg.height : 1672/941;
  sw = Math.max(cw, ch*ar); sh = sw/ar;              // COVER-fit the scene (fill, crop overflow — no gaps)
  if (sh < ch) { sh = ch; sw = sh*ar; }
  sx0 = (cw - sw)/2; sy0 = (ch - sh)/2;              // negative offset where the image overflows
  U = sh * 0.17;                                      // agent display height (px)
  if (typeof clampPan==='function') clampPan();       // keep any drag-pan within bounds after a resize
}
// normalized scene coord (0..1, x→right, y→down) → screen px
function iso(nx,ny){ return { x: sx0 + panX + nx*sw, y: sy0 + panY + ny*sh }; }

/* ---------------- Agents ---------------- */
// positions are NORMALIZED scene coords (gx,gy in 0..1) over scene-full.png
// 3 iMac desks down the LEFT side of the scene (top→bottom, diagonal) + butler center
const HOME = { lead:{gx:0.30,gy:0.34}, coord:{gx:0.31,gy:0.50}, designer:{gx:0.20,gy:0.64}, butler:{gx:0.52,gy:0.64} };
const SEAT = { lead:{gx:0.30,gy:0.34}, coord:{gx:0.31,gy:0.50}, designer:{gx:0.20,gy:0.64}, butler:{gx:0.52,gy:0.64} };
const REVIEW_FRONT = {gx:0.34,gy:0.42};
const OPS_FRONT = {gx:0.62,gy:0.46};
const GARDEN = [{gx:0.80,gy:0.74}, {gx:0.71,gy:0.82}, {gx:0.88,gy:0.80}];
const COFFEE_SPOT = {gx:0.80,gy:0.22};
const KITCHEN = {gx:0.82,gy:0.21};   // พ่อบ้านงีบในครัว (มุมขวาบน)
const STAIRS = {gx:0.44,gy:0.82};    // หัวบันได (กลาง-ล่างของฉาก)
const EXIT   = {gx:0.44,gy:1.25};    // เดินลงบันไดออกนอกเฟรม (ใต้ขอบล่าง)
let offDuty = false;                 // เลิกงาน = ตัวละครเดินออก
const MEET = [{gx:0.33,gy:0.37}, {gx:0.47,gy:0.37}, {gx:0.40,gy:0.47}];

const PROFILE = {
  designer:{ title:'Senior Product Designer', specialty:'Mobile fintech UX · Figma', tools:['Figma','FigJam','Tokens Studio'],
    skills:[['Figma Mastery',96],['Wireframing',92],['User Flows',88],['Design Systems',90],['Prototyping',84],['Visual Design',86]] },
  lead:{ title:'Design Team Lead', specialty:'Review · accessibility · QA', tools:['Figma','Jira','axe DevTools'],
    skills:[['Design Review',95],['Accessibility',90],['Constructive Feedback',88],['Prioritization',85],['Mentorship',82],['Consistency QA',91]] },
  coord:{ title:'Project Coordinator', specialty:'รีวิวงาน + จัดทำเอกสาร/สเปก (+ รายงาน Discord)', tools:['Notion','Docs','Jira','Discord'],
    skills:[['Document & Spec',94],['Review & QA',91],['Requirement',88],['Status Reporting',86],['Risk Tracking',83],['Communication',90]] },
  butler:{ title:'Office Butler · Dev', specialty:'สร้าง/ดูแลออฟฟิศ · แก้โค้ด (ตัวแทนแชท Develop)', tools:['Claude Code','VS Code','Git','Node'],
    skills:[['Build Office',95],['Code & Debug',93],['System Care',90],['Automation',88],['Monitoring',91],['Reliability',89]] },
};
const agents = [
  mkAgent('ux','Pixel','Senior UX/UI Designer','designer',0),
  mkAgent('lead','Cora','Team Lead','lead',1),
  mkAgent('coord','Milo','Project Coordinator · Review & Docs','coord',2),
  mkAgent('butler','Otto','พ่อบ้าน / Dev Butler','butler',3),
];
function mkAgent(id,name,role,kind,idx){
  const h = HOME[kind]; const pf = PROFILE[kind];
  return {
    id,name,role,kind,idx,
    gx:h.gx,gy:h.gy,
    tx:null,ty:null,onArrive:null,facing:1,fx:0,fy:1,walking:false,bob:Math.random()*6,
    fsm:'init',timer:0.6+idx*0.5,
    task:null,progress:0,energy:78+idx*6,
    status:'Booting…',statusKind:'idle',
    project:'Project Aurora',
    sprite: kind==='designer'?'pixel':kind==='lead'?'cora':kind==='butler'?'butler':'milo',  // which PNG set
    poseUntil:0, poseName:null,                                     // transient pose (happy/cheer)
    coworkActive:false, coworkBusy:false, coworkTitle:'', coworkTool:'', _coworkPrev:false, _lastCountedTool:'',  // live cowork-session state
    title:pf.title, specialty:pf.specialty, tools:pf.tools, skills:pf.skills,
    holding:false,            // carrying a deliverable (handoff)
    metrics:{done:0,reviews:0,reports:0,approvals:0,rejections:0,figma:0},
    history:[], comms:[], trend:[60,64,62,70,72,68,75],
    reasoning:'',
  };
}
// live activity level (0 when idle/asleep — the team only "works" on assigned tasks)
function activityLevel(a){
  if(a.statusKind==='working'||a.statusKind==='review'){ const p=Math.round(a.progress||0); return Math.max(12, p>0?p:80); }
  if(a.statusKind==='walking') return 35;
  if(a.statusKind==='meeting') return 50;
  return 0; // sleep / idle
}
const A = {}; agents.forEach(a=>A[a.id]=a);

/* deterministic-ish rng so first paint is stable, then evolves */
let _seed=1337; function rng(){ _seed=(_seed*1664525+1013904223)&0x7fffffff; return _seed/0x7fffffff; }

/* ---------------- Tasks / Kanban ---------------- */
let taskSeq = 100;
const TASK_TITLES = [
  'Onboarding User Flow','Dashboard Wireframes','Transaction UI Mockups',

const SND={ on:false, ctx:null, master:null, ambient:null };
function _sndInit(){ if(SND.ctx) return; try{
  SND.ctx=new (window.AudioContext||window.webkitAudioContext)();
  SND.master=SND.ctx.createGain(); SND.master.gain.value=0.55; SND.master.connect(SND.ctx.destination);
}catch(e){} }
// play a sequence of notes (chiptune-style blip/chime)
function _blip(freqs,dur=0.12,type='square',vol=0.18){
  if(!SND.on||!SND.ctx) return;
  const list=Array.isArray(freqs)?freqs:[freqs], t0=SND.ctx.currentTime;
  list.forEach((f,i)=>{ const o=SND.ctx.createOscillator(), g=SND.ctx.createGain();
    o.type=type; o.frequency.value=f; const st=t0+i*dur*0.9;
    g.gain.setValueAtTime(0.0001,st); g.gain.linearRampToValueAtTime(vol,st+0.012);
    g.gain.exponentialRampToValueAtTime(0.0006,st+dur);
    o.connect(g); g.connect(SND.master); o.start(st); o.stop(st+dur+0.03); });
}
const sfx={
  click(){ _blip(520,0.06,'square',0.09); },
  select(){ _blip([440,660],0.07,'square',0.11); },
  open(){ _blip([523,784],0.10,'triangle',0.13); },
  close(){ _blip([784,392],0.09,'triangle',0.11); },
  clockIn(){ _blip([392,523,659,784],0.10,'square',0.13); },
  clockOut(){ _blip([784,659,523,392],0.11,'triangle',0.12); },
  done(){ _blip([659,880,1175],0.12,'triangle',0.14); },
  alert(){ _blip([880,0,880],0.13,'sawtooth',0.15); },
};
// soft ambient pad (calm chord + slow filter sweep) — loops while sound is on
function _ambientStart(){ if(!SND.on||!SND.ctx||SND.ambient) return;
  const g=SND.ctx.createGain(); g.gain.value=0.0001; g.connect(SND.master);
  const lp=SND.ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=550; lp.Q.value=4; lp.connect(g);
  const notes=[130.81,164.81,196.00,261.63];   // Cmaj pad
  const oscs=notes.map(f=>{ const o=SND.ctx.createOscillator(); o.type='sine'; o.frequency.value=f;
    const og=SND.ctx.createGain(); og.gain.value=0.42/notes.length; o.connect(og); og.connect(lp); o.start(); return o; });
  g.gain.linearRampToValueAtTime(0.05, SND.ctx.currentTime+2.5);   // gentle fade-in
  const lfo=SND.ctx.createOscillator(); lfo.type='sine'; lfo.frequency.value=0.06;
  const lfoG=SND.ctx.createGain(); lfoG.gain.value=200; lfo.connect(lfoG); lfoG.connect(lp.frequency); lfo.start();
  SND.ambient={g,oscs,lfo};
}
function _ambientStop(){ if(!SND.ambient) return; const {g,oscs,lfo}=SND.ambient;
  try{ g.gain.cancelScheduledValues(SND.ctx.currentTime); g.gain.linearRampToValueAtTime(0.0001,SND.ctx.currentTime+0.8);
    oscs.forEach(o=>o.stop(SND.ctx.currentTime+1)); lfo.stop(SND.ctx.currentTime+1); }catch(e){} SND.ambient=null; }
function _updateSndBtn(){ const b=document.getElementById('sndBtn'); if(!b) return;

}

/* ---------------- Movement ---------------- */
function goTo(a,gx,gy,cb){ a.tx=gx;a.ty=gy;a.onArrive=cb||null; }
function stepMove(a,dt){
  if(a.tx==null){ a.walking=false; return; }
  const dx=a.tx-a.gx, dy=a.ty-a.gy, dist=Math.hypot(dx,dy);
  const spd=0.16; // normalized units/sec
  if(dist < spd*dt){ a.gx=a.tx;a.gy=a.ty;a.tx=a.ty=null;a.walking=false; const cb=a.onArrive;a.onArrive=null; if(cb)cb(); return; }
  a.gx+=dx/dist*spd*dt; a.gy+=dy/dist*spd*dt; a.walking=true;
  a.fx=dx/dist; a.fy=dy/dist; a.facing = dx>=0?1:-1;  // facing direction
}

const SCOPE2AGENT = { pixel:'ux', cora:'lead', milo:'coord', butler:'butler' };
const SCOPE_VERB  = { ux:'กำลังสร้างงานใน Figma', lead:'กำลังรีวิวงาน Figma', coord:'กำลังรีวิว + ทำเอกสาร', butler:'กำลัง build / แก้โค้ด office' };

async function pollSessions(){
  if(!LIVE.ok) return;
  try{
    const j = await (await fetch(LIVE.url+'/api/sessions')).json();
    liveSessions = j.sessions || [];
    liveDoneTasks = j.doneTasks || [];
    liveUsage = j.usage || liveUsage;
    // chime when a new task finishes (skip the very first load)
    if(_prevDoneCount>0 && liveDoneTasks.length>_prevDoneCount) sfx.done();
    _prevDoneCount = liveDoneTasks.length;
    figmaActive = !!(liveUsage && liveUsage.figmaActive);   // designing in Figma right now?
    // Otto = this dev chat → running cumulative tokens since the chat was created (whole transcript)
    liveButlerTokens = liveSessions.filter(s=>s.scope==='butler').reduce((a,s)=>a+(s.sessTok||0),0);
    applyLiveSessions();
    updateKanbanAlert();
    if(kanbanOpen) renderKanban();
  }catch(e){ /* ignore */ }

function applyLiveSessions(){
  // pick one representative session per scope: prefer a BUSY one, else most-recent
  const best = {pixel:null, cora:null, milo:null, butler:null};
  for(const s of liveSessions){
    if(!(s.scope in best)) continue;
    const cur=best[s.scope];
    if(!cur || (s.busy&&!cur.busy) || (s.busy===cur.busy && s.idleMs<cur.idleMs)) best[s.scope]=s;
  }
  for(const scope in best){
    const a=A[SCOPE2AGENT[scope]]; const s=best[scope];
    const prev=a._coworkPrev;
    if(s){
      a.coworkActive=true; a.coworkBusy=s.busy; a.coworkChat=s.chat;
      // only show a "current task" while actually working — clear it when the session goes idle/sleeping
      a.coworkTitle = s.busy ? s.title : ''; a.coworkTool = s.busy ? s.lastTool : '';
      // bump Figma Updates KPI when the designer/lead session touches a new Figma tool
      if(s.busy && /figma|get_design|get_screenshot|get_variable|create_design|edit/i.test(s.lastTool) && s.lastTool!==a._lastCountedTool){
        a._lastCountedTool=s.lastTool; if(a.kind!=='coord') A.ux.metrics.figma++;
      }
    } else {
      a.coworkActive=false; a.coworkBusy=false;
    }
    if(prev && !a.coworkActive){ a.fsm = a.kind==='designer'?'waiting':'idle'; }  // session gone → back to normal FSM
    a._coworkPrev=a.coworkActive;
  }
  // ทำงานร่วมกันตามเนื้องาน → เดินไปคุยกัน (Milo = ตัวประสาน):
  //   Figma/เอกสาร → Designer(Pixel) คุยกับ Project Co(Milo)
  //   ตรวจงาน      → Team Lead(Cora) คุยกับ Project Co(Milo)
  agents.forEach(a=>a.collab=-1);
  const grp=[];
  if(A.ux.coworkActive   && A.ux.coworkBusy)   grp.push(A.ux);    // ดีไซเนอร์ทำ Figma/เอกสาร
  if(A.lead.coworkActive && A.lead.coworkBusy) grp.push(A.lead);  // หัวหน้าตรวจงาน
  if(grp.length){ grp.push(A.coord); grp.forEach((a,i)=>{ a.collab=i; }); }  // Milo เข้ามาประสาน
}

function habitWander(a,dt,spots,pause){
  if(a.walking) return;

  if(a._habitT>0) return;
  a._habitIdx=((a._habitIdx==null? a.idx : a._habitIdx)+1)%spots.length;
  const s=spots[a._habitIdx];
  goTo(a,s.gx,s.gy);
  a._habitT=(pause||3)+(a.idx%3);     // pause after arriving (staggered per agent)
}

/* ---- KANBAN BOARD: realtime cards of today's cowork sessions, by status ---- */
let kanbanOpen=false; let _prevWaiting=new Set();
let kanViewDay='';            // '' or 'YYYY-MM-DD' — which Bangkok day the board is showing
let kanHistTasks=[];          // done tasks for a PAST day (today uses live liveDoneTasks instead)
let kanDays=[];               // list of days that have history
let kanFilter=null;           // null = all; else a scope (pixel/cora/milo/butler) → show only that person
function kanToggleFilter(sc){ kanFilter = (kanFilter===sc) ? null : sc; _kanSig=''; renderKanban(); sfx.click(); }
function _hhmm(ts){ try{ return new Intl.DateTimeFormat('th-TH',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bangkok'}).format(new Date(ts)); }catch(e){ return ''; } }
function _tok(n){ n=+n||0; return n>=1e9?(n/1e9).toFixed(2)+'B':n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?Math.round(n/1e3)+'k':String(n); }
function bkkTodayStr(){ try{ return new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Bangkok'}).format(new Date()); }catch(e){ return new Date().toISOString().slice(0,10); } }
function _isToday(ts){ try{ return new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Bangkok'}).format(new Date(ts))===bkkTodayStr(); }catch(e){ return true; } }
function kanDayLabel(day){
  const today=bkkTodayStr();
  let th=day; try{ th=new Intl.DateTimeFormat('th-TH',{weekday:'long',day:'numeric',month:'short',year:'numeric'}).format(new Date(day+'T00:00:00')); }catch(e){}
  return (day===today?'📅 วันนี้ · ':'📅 ย้อนหลัง · ')+th;
}
async function loadKanDay(day){
  kanViewDay=day||bkkTodayStr();
  const today=bkkTodayStr();
  const inp=document.getElementById('kanDateInput'); if(inp){ inp.value=kanViewDay; inp.max=today; }
  const lbl=document.getElementById('kanDayLbl'); if(lbl) lbl.textContent=kanDayLabel(kanViewDay);
  const nb=document.getElementById('kanNextBtn'); if(nb) nb.disabled=(kanViewDay>=today);
  if(LIVE.ok){
    try{ const j=await (await fetch(LIVE.url+'/api/done?day='+encodeURIComponent(kanViewDay))).json();
      kanHistTasks=j.tasks||[]; if(Array.isArray(j.days)) kanDays=j.days;
    }catch(e){ kanHistTasks=[]; }
  }
  _kanSig=''; renderKanban();
}
function kanPickDay(v){ if(v) loadKanDay(v); }
function kanShiftDay(delta){
  const base=kanViewDay||bkkTodayStr();
  const d=new Date(base+'T00:00:00'); d.setDate(d.getDate()+delta);
  let ns=base; try{ ns=new Intl.DateTimeFormat('en-CA').format(d); }catch(e){}
  if(ns>bkkTodayStr()) return;     // no future days
  loadKanDay(ns);
}
function openKanban(){ kanbanOpen=true; _kanSig=''; document.getElementById('kanbanModal').style.display='flex';
  loadKanDay(kanViewDay||bkkTodayStr()); sfx.open(); }
function closeKanban(){ kanbanOpen=false; document.getElementById('kanbanModal').style.display='none'; sfx.close(); }
// realtime alert badge on the Kanban button + toast when a NEW session starts waiting for allow
function updateKanbanAlert(){
  const waiting = liveSessions.filter(s=>s.waiting);
  const badge=document.getElementById('kanAlert');
  if(badge){ if(waiting.length){ badge.style.display='grid'; badge.textContent=waiting.length; } else badge.style.display='none'; }
  const btn=document.getElementById('kanBtn'); if(btn) btn.style.borderColor = waiting.length? '#ff4d6d' : '';
  for(const s of waiting){ if(!_prevWaiting.has(s.id)){
    const a=A[SCOPE2AGENT[s.scope]];

    sfx.alert();
  }}
  _prevWaiting = new Set(waiting.map(s=>s.id));
}
function renderKanban(){
  const host=document.getElementById('kanCols'); if(!host) return;
  const viewDay=kanViewDay||bkkTodayStr();
  const isToday=(viewDay===bkkTodayStr());
  // waiting/working are LIVE → only meaningful for today; past days show done history only
  const today=isToday ? liveSessions.filter(s=>_isToday(s.startedAt)) : [];
  const srcDone=isToday ? (liveDoneTasks||[]) : (kanHistTasks||[]);
  // each archived completed task → a "done" card (newest first)
  const doneCards=srcDone.slice().reverse().map(d=>({
    scope:d.scope, state:'done', chat:d.chat, title:d.task, lastTool:d.lastTool, lastFile:d.lastFile,
    toolCount:d.toolCount, ended:true, idleMs:Date.now()-d.at, startedAt:d.at, doneAt:d.at,
    cost:d.cost||0, tokens:d.tokens||0
  }));
  const liveEmpty=isToday ? '— ไม่มีงาน —' : '— ดูได้เฉพาะวันนี้ —';
  // total tokens for the day (sum of done cards)
  const sumT=doneCards.reduce((a,d)=>a+(d.tokens||0),0);
  // optional per-person filter (click a summary card) — show only that scope's cards
  const flt = arr => kanFilter ? arr.filter(s=>s.scope===kanFilter) : arr;
  const fDoneCards = flt(doneCards);
  const fSumT = fDoneCards.reduce((a,d)=>a+(d.tokens||0),0);
  const cols=[
    {key:'waiting', label:'⏳ รอ allow / รอตอบ', items:flt(today.filter(s=>s.state==='waiting')), empty:liveEmpty},
    {key:'working', label:'🟢 กำลังทำ',          items:flt(today.filter(s=>s.state==='working'||s.state==='idle')), empty:liveEmpty},
    {key:'done',    label:`✅ เสร็จแล้ว${fDoneCards.length?` · 🪙${_tok(fSumT)} tokens`:''}`, items:fDoneCards, empty:'— ไม่มีงาน —'},
  ];
  // per-character summary: ใครรอ allow / กำลังทำ / เสร็จกี่งาน + เผา token เท่าไหร่
  const SUM_ORDER=['pixel','cora','milo','butler'];
  const tally={}; SUM_ORDER.forEach(sc=>tally[sc]={wait:0,work:0,done:0,tok:0});
  for(const s of today){ const t=tally[s.scope]; if(!t)continue; if(s.state==='waiting')t.wait++; else if(s.state==='working'||s.state==='idle')t.work++; }
  for(const d of doneCards){ const t=tally[d.scope]; if(!t)continue; t.done++; t.tok+=(d.tokens||0); }
  const sumHost=document.getElementById('kanSummary');
  if(sumHost) sumHost.innerHTML=SUM_ORDER.map(sc=>{ const a=A[SCOPE2AGENT[sc]]; const t=tally[sc];
    // Otto shows running total since chat start (when viewing today); others = that day's sum
    const tokVal=(isToday && sc==='butler' && liveButlerTokens>0) ? liveButlerTokens : t.tok;
    const tokTip=(isToday && sc==='butler') ? 'รวมตั้งแต่เริ่มแชท' : 'เผา token';
    const on=kanFilter===sc, dim=kanFilter&&!on;
    return `<div class="kanSum${on?' active':''}${dim?' dim':''}" onclick="kanToggleFilter('${sc}')" title="กดเพื่อกรองเฉพาะ ${a.name} (กดซ้ำเพื่อล้าง)">
      <img src="${avatarURL(a)}" alt=""/><div class="ks-info"><div class="ks-nm">${a.name}${on?' ✕':''}</div>
      <div class="ks-counts"><span class="kw" title="รอ allow">⏳ ${t.wait}</span><span class="kg" title="กำลังทำ">🟢 ${t.work}</span><span class="kd" title="เสร็จ">✅ ${t.done}</span></div></div>
      <div class="ks-tok" title="${tokTip}">🪙 ${_tok(tokVal)}</div></div>`;
  }).join('');
  // banner for waiting
  const wn=cols[0].items.length;
  const banner=document.getElementById('kanBanner'); if(banner){ banner.style.display=wn?'flex':'none'; const n=document.getElementById('kanBannerN'); if(n)n.textContent=wn; }
  // skip DOM rebuild when nothing visible changed → no blink/jitter (and the scan bar keeps running)
  const sig=viewDay+'|'+(kanFilter||'')+'|'+JSON.stringify(cols.map(c=>[c.key,c.items.map(s=>s.scope+'|'+s.state+'|'+(s.title||'')+'|'+(s.lastTool||'')+'|'+(s.lastFile||'')+'|'+(s.waitTool||''))]));
  if(sig===_kanSig) return;
  _kanSig=sig;
  host.innerHTML=cols.map(c=>{
    const dis = !isToday && (c.key==='waiting'||c.key==='working');   // live-only cols → disable on past days
    return `<div class="kanCol${dis?' disabled':''}">
      <div class="kanColH">${c.label}<span class="cnt">${c.items.length}</span></div>
      ${dis? '<div class="kanEmpty">🔒 ดูได้เฉพาะวันนี้</div>'
           : (c.items.length? c.items.map(kanCard).join('') : '<div class="kanEmpty">'+(c.empty||'— ไม่มีงาน —')+'</div>')}
    </div>`;
  }).join('');
}
let _kanSig='';
function kanCard(s){
  const a=A[SCOPE2AGENT[s.scope]]||{name:s.scope,role:'',sprite:s.scope};
  const av=avatarURL(a);
  const desc=(s.title||'(ไม่มีรายละเอียด)').replace(/</g,'&lt;');

  const statusTxt = s.state==='waiting'?'รอ allow':s.state==='working'?'กำลังทำ':s.state==='done'?(s.ended?'เสร็จ (ปิด session)':'เสร็จรอบ'):'พัก';
  const rightTxt = s.state==='done' ? ('เสร็จ '+_hhmm(Date.now()-(s.idleMs||0))) : ('เริ่ม '+_hhmm(s.startedAt));
  const chat=(s.chat||'').replace(/</g,'&lt;');

    ${chat? `<div class="kanProj">💬 ${chat}</div>`:''}
    ${s.waiting? `<div class="allowTag">⚠️ รอ allow: ${(s.waitTool||'allow').replace(/</g,'&lt;')}</div>`:''}
    <div class="desc"><span class="taskLbl">งาน:</span> ${desc}</div>
    ${s.lastTool? `<div class="tool">🔧 ${s.lastTool.replace(/</g,'&lt;')}${s.lastFile?' · '+s.lastFile.replace(/</g,'&lt;'):''}</div>`:''}
    ${(s.state==='done' && s.tokens)? `<div class="usg">🪙 ${_tok(s.tokens)} tokens</div>`:''}
    <div class="barwrap">${bar}</div>
    <div class="foot"><span>${statusTxt} · ${s.toolCount||0} actions</span><span>${rightTxt}</span></div>
  </div>`;
}

// completed-work archive (saved to disk by the backend → survives refresh)
let doneList=[];
function recordDeliverable(t, verdict, r){
  const n=t.aiNotes||{};
  const rec={ id:t.id, title:t.title, verdict,
    summary:n.deliverable_summary||'', decisions:n.key_decisions||[], figma_note:n.figma_note||'',
    feedback:(r&&r.feedback)||(verdict==='approve'?'อนุมัติ — ผ่านเกณฑ์':'ขอให้แก้ไข'), at:new Date().toISOString() };
  doneList.unshift(rec); if(doneList.length>200) doneList.length=200;
  if(activeTab==='done') renderRight();
  if(LIVE.ok){ fetch(LIVE.url+'/api/deliverable',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(rec)}).catch(()=>{}); }
}
async function fetchDeliverables(){
  if(!LIVE.ok) return;
  try{ const j=await (await fetch(LIVE.url+'/api/deliverables')).json();
    if(j.items){ doneList=j.items; if(activeTab==='done') renderRight(); } }catch(e){}

function finishDesign(a, r){
  const t=a.task; if(!t) return;
  t.status='In Review'; t.progress=100; a._aiPending=false;
  a.metrics.done++; a.metrics.figma++;
  if(r){
    t.aiNotes=r;
    a.reasoning='🧠 '+(r.deliverable_summary||'')+(r.key_decisions?.length?(' · การตัดสินใจ: '+r.key_decisions.join('; ')):'');
    comm(a,'อัปเดต Figma · '+t.title+' — '+(r.figma_note||'พร้อมให้รีวิว'));
    log(a,'design','✅','เสร็จแล้ว '+t.title+' — '+(r.key_decisions?.[0]||'ส่งเข้ารีวิว'),'#5cf08a');
  } else {
    comm(a,'อัปเดตไฟล์ Figma · '+t.title+' พร้อมให้รีวิว');
    log(a,'design','✅','เสร็จแล้ว '+t.title+' — ส่งเข้ารีวิว','#5cf08a');
  }
  a.holding=true; a.fsm='deliverGo';
  goTo(a,REVIEW_FRONT.gx,REVIEW_FRONT.gy,()=>{ a.fsm='deliverWait'; a.timer=1.6; });
  setStatus(a,'กำลังส่งงานให้หัวหน้า','walking');
}
function updateDesigner(a,dt){
  if(a.coworkActive){ liveDrive(a,dt); return; }   // live cowork session takes over
  if(a.fsm==='aiThink'){ setStatus(a,'กำลังออกแบบกับ Claude…','working'); return; }
  if(a.fsm==='waiting'){
    if(t_now < figmaPulseUntil){   // cowork is actively running Figma MCP right now
      setStatus(a,'กำลังแก้ Figma (จาก cowork)','working');
      a.reasoning='cowork กำลังเรียก Figma MCP — '+(lastFigmaTool||'แก้ไฟล์ออกแบบ');
    } else {
      idleHabit(a,dt);   // 🎮 ยังไม่มีงาน → เล่นเกมรอที่โต๊ะ
    }
    if(tasks.some(x=>x.status==='Backlog')) startDesignerTask(a);
    return;
  }
  if(a.fsm==='init'){ a.timer-=dt; if(a.timer<=0){ goTo(a,SEAT.designer.gx,SEAT.designer.gy,()=>startDesignerTask(a)); } return; }
  if(a.fsm==='work'){
    setStatus(a, a.task.revision?'Reworking in Figma':'Designing in Figma','working');
    a.progress=Math.min(100,a.progress+dt*(a.energy>25?7.5:4));
    if(a.task) a.task.progress=a.progress;
    a.energy=Math.max(0,a.energy-dt*0.9);
    a.reasoning = `กำลังปั้น <b>${a.task.title}</b> ใน Figma — จัด grid, auto-layout และสี token ให้เรียบร้อย ตั้งใจส่งงานเมื่อเฟรมผ่านการตรวจเอง`;
    if(a.progress>=100){
      finishDesign(a,null);
    }
    return;
  }
  if(a.fsm==='deliverGo'){ setStatus(a,'กำลังเดินไปส่งรีวิว','walking'); return; }
  if(a.fsm==='deliverWait'){
    setStatus(a,'ส่งงานให้ Cora','meeting'); a.timer-=dt;
    if(a.timer<=0){
      reviewQueue.push({task:a.task}); a.holding=false; a.task=null;
      log(a,'handoff','📤','ส่งงานดีไซน์ให้หัวหน้าทีมแล้ว','#b08bff');
      a.fsm='deliverBack';
      goTo(a,SEAT.designer.gx,SEAT.designer.gy,()=>{
        if(a.energy<22){ a.fsm='relaxGo'; const g=GARDEN[a.idx%GARDEN.length];
          goTo(a,g.gx,g.gy,()=>{a.fsm='relax';a.timer=8;}); }
        else startDesignerTask(a);
      });
    }
    return;
  }
  if(a.fsm==='deliverBack'){ setStatus(a,'กำลังกลับโต๊ะ','walking'); return; }
  if(a.fsm==='relaxGo'){ setStatus(a,'กำลังไปสวน','walking'); return; }
  if(a.fsm==='relax'){
    setStatus(a,'พักชาร์จพลังในสวน','idle'); a.energy=Math.min(100,a.energy+dt*6); a.timer-=dt;
    a.reasoning='พลังงานต่ำ — ขอพักสั้น ๆ ในสวนเพื่อเรียกสมาธิกลับมาก่อนเริ่มงานถัดไป';
    if(a.timer<=0){ goTo(a,SEAT.designer.gx,SEAT.designer.gy,()=>startDesignerTask(a)); }
    return;
  }
}

function decideReview(a, r){
  a._aiPending=false; const t=a.task; if(!t){ a.fsm='idle'; a.timer=1; return; }
  const approve = r ? (r.decision==='approve') : (rng()>0.25);
  if(approve){
    t.status='Approved'; approvedTasks.unshift(t); a.metrics.approvals++;
    sprint.done=Math.min(sprint.total,sprint.done+1);
    log(a,'approve','🟢','อนุมัติ '+t.title,'#2ff0a0');
    comm(a,(r&&r.feedback)? ('อนุมัติ '+t.title+' — '+r.feedback) : ('อนุมัติ '+t.title+' ✓ เยี่ยมมาก'));
    toast('🟢','อนุมัติงานดีไซน์',t.title,'#2ff0a0');
    reportQueue.push({kind:'approved',task:t});
  } else {
    t.status='In Progress'; t.revision=true; t.owner='ux'; t.progress=30; a.metrics.rejections++;
    pendingRevision=true;
    log(a,'reject','🔴','ขอให้แก้ไข '+t.title,'#ff5d7a');
    comm(a,(r&&r.feedback)? ('ขอแก้ '+t.title+' — '+r.feedback) : ('ต้องแก้ '+t.title+' — จัดระยะห่าง & สถานะให้เรียบร้อย'));
    toast('🟠','ขอให้แก้ไข',(r&&r.feedback)? r.feedback : (t.title+' · ส่ง feedback ให้ Pixel แล้ว'),'#ffd56b');
    reportQueue.push({kind:'blocked',task:t});
  }
  recordDeliverable(t, approve?'approve':'revise', r);   // archive + save file
  a.task=null; a.fsm='idle'; a.timer=1;
}

    return;
  }
  if(a.fsm==='reportGo'||a.fsm==='dailyReportGo'){ setStatus(a,'กำลังไปโต๊ะ Ops','walking'); return; }
  if(a.fsm==='report'){
    setStatus(a,'กำลังโพสต์ลง Discord','working'); a.timer-=dt;
    a.reasoning='กำลังเรียบเรียงอัปเดตสถานะลง Discord จากผลรีวิวล่าสุด เพื่อแจ้งทีมใน #aurora-updates';
    if(a.timer<=0){
      sendReport(a,null);
    }
    return;
  }
  if(a.fsm==='dailyReport'){
    setStatus(a,'กำลังเขียนสรุปประจำวัน','working'); a.timer-=dt;
    if(a.timer<=0){
      a.metrics.reports++;
      const done=A.ux.metrics.done, appr=A.lead.metrics.approvals;
      discordReport('📊 Daily Summary · '+clk(),'Designs shipped: **'+done+'** · Approved: **'+appr+'** · Reports sent: **'+(a.metrics.reports)+'**. Velocity healthy, no critical blockers. Team morale: high ☕');
      log(a,'discord','📊','ส่งสรุปความคืบหน้าประจำวันลง Discord','#7a4fd0');
      comm(a,'#aurora-daily · 📊 โพสต์สรุปประจำวันแล้ว');
      a.fsm='idle'; a.timer=2;
    }
    return;
  }
}

/* ---------------- Meeting director ---------------- */
function maybeMeeting(dt){
  if(meetingActive){
    meetingTimer-=dt;
    if(meetingTimer<=0){ endMeeting(); }
    return;
  }
  nextMeetingIn-=dt;
  if(nextMeetingIn<=0){
    if(agents.some(a=>a._aiPending)){ nextMeetingIn=3; return; } // wait for live calls
    const hasWork = tasks.some(t=>t.status==='In Progress'||t.status==='Backlog') || reviewQueue.length || reportQueue.length;
    if(!hasWork){ nextMeetingIn=8; return; } // don't gather a stand-up while everyone's asleep
    startMeeting();
  }
}
function startMeeting(){
  meetingActive=true; meetingTimer=13;
  log(A.lead,'meeting','👥','Stand-up: ทีมรวมตัวในห้องประชุม','#ffb020');
  toast('👥','ประชุม stand-up','ทีมกำลังซิงก์งานในห้องประชุม','#ffc861');
  agents.forEach((a,i)=>{ if(a.kind==='butler') return;   // butler tends the office, doesn't join design stand-ups
    a._resume=a.fsm; a.fsm='meet'; const m=MEET[i%MEET.length];
    goTo(a,m.gx,m.gy,()=>{ setStatus(a,'ประชุม stand-up','meeting'); }); setStatus(a,'กำลังไปห้องประชุม','walking'); });
}
function endMeeting(){
  meetingActive=false; nextMeetingIn=52+rng()*20;
  log(A.coord,'meeting','✅','ประชุมเสร็จ — กลับไปทำงาน','#4cc38a');
  agents.forEach(a=>{
    a._aiPending=false;
    const h=HOME[a.kind];
    goTo(a,h.gx,h.gy,()=>{
      if(a.kind==='designer'){ if(a.task) a.fsm='work'; else startDesignerTask(a); }
      else a.fsm='idle';
    });
  });
}
function updateMeetingAgent(a,dt){
  if(a.fsm!=='meet') return false;
  setStatus(a, a.walking?'กำลังไปห้องประชุม':'ประชุม stand-up', a.walking?'walking':'meeting');
  a.reasoning='ประชุม stand-up: อัปเดตความคืบหน้า แจ้ง blocker และตกลงการส่งงานดีไซน์ครั้งถัดไป';
  if(a.kind!=='designer') a.energy=Math.min(100,a.energy+dt*1.5);
  return true;
}

/* ---------------- Main sim tick ---------------- */
/* ---- clock in / out: walk everyone down the stairs & off-frame, or back to the office ---- */
function driveOff(a){
  setStatus(a, a.offState==='out'?'เลิกงานแล้ว 👋':'กำลังเดินลงบันได','walking');
  a.reasoning='เลิกงาน — เดินลงบันไดกลับบ้าน';
}
// apply current offDuty state. animate=true → walk; false → snap (used on page load)
function applyDuty(animate){
  const b=document.getElementById('dutyBtn');
  if(offDuty){
    if(b){ b.innerHTML='<span class="pixel">▶ เริ่มงาน</span>'; b.classList.add('off'); }
    agents.forEach(a=>{ a.task=null; a._aiPending=false;
      if(animate){ a.offState='leaving'; goTo(a, STAIRS.gx, STAIRS.gy, ()=>{ a.offState='out'; goTo(a, EXIT.gx, EXIT.gy); }); }
      else { a.offState='out'; a.tx=a.ty=null; a.gx=EXIT.gx; a.gy=EXIT.gy; } });   // start clocked-out: already off-frame
  } else {
    if(b){ b.innerHTML='<span class="pixel">🚪 เลิกงาน</span>'; b.classList.remove('off'); }
    agents.forEach(a=>{ a.offState=null; a.tx=a.ty=null;
      if(a.kind==='designer') a.fsm='waiting'; else if(a.kind!=='butler') a.fsm='idle';
      if(!animate){ const h=HOME[a.kind]||SEAT.coord; a.gx=h.gx; a.gy=h.gy; } });
  }
}
function toggleDuty(){
  offDuty=!offDuty;
  try{ localStorage.setItem('studiopixel_offDuty', offDuty?'1':'0'); }catch(e){}   // remember across refresh
  applyDuty(true);
  if(offDuty){ toast('🚪','เลิกงาน','ทีมเดินลงบันไดกลับบ้าน 👋','#b08bff'); sfx.clockOut(); }
  else { toast('▶','เริ่มงาน','ทีมกลับมาประจำที่ออฟฟิศแล้ว','#2ff0a0'); sfx.clockIn(); }
}
function tick(dt){
  if(speed===0) return;
  dt*=speed;
  simSeconds += dt*60;   // 1 real sec ≈ 1 sim min (×speed)
  if(!offDuty) maybeMeeting(dt);
  for(const a of agents){
    stepMove(a,dt);
    a.bob += dt* (a.walking?9:3);
    if(offDuty){ driveOff(a); continue; }      // clocked out → walk to the stairs & off-frame
    if(a.collab>=0){ collabDrive(a,dt); continue; }   // ทำงานร่วมกัน → เดินไปคุยกัน
    if(updateMeetingAgent(a,dt)) continue;
    if(a.kind==='designer') updateDesigner(a,dt);
    else if(a.kind==='lead') updateLead(a,dt);
    else if(a.kind==='butler') updateButler(a,dt);
    else updateCoord(a,dt);
    // trend drift
  }
  // periodic trend sampling
  trendTimer-=dt; if(trendTimer<=0){ trendTimer=4; agents.forEach(a=>{ a.trend.push(Math.round(prodScore(a))); if(a.trend.length>28)a.trend.shift(); }); }
}
let trendTimer=4;

/* ---------------- Derived metrics ---------------- */
function prodScore(a){
  const base = a.kind==='designer'? a.metrics.done*9 + a.metrics.figma*2
            : a.kind==='lead'? a.metrics.reviews*10 + a.metrics.approvals*4
            : a.metrics.reports*9;
  return Math.max(35,Math.min(99, 55 + (base%45) + a.energy*0.12));
}
function teamHealth(){
  const appr=A.lead.metrics.approvals, rej=A.lead.metrics.rejections;
  const ratio = appr+rej>0? appr/(appr+rej):0.85;
  const e=(A.ux.energy+A.lead.energy+A.coord.energy)/3;
  return Math.round(Math.max(40,Math.min(99, 50+ratio*35+e*0.12)));
}
function countActiveTasks(){ return tasks.filter(t=>t.status==='In Progress').length; }
function countReview(){ return tasks.filter(t=>t.status==='In Review').length + reviewQueue.length; }

/* ============================================================
   RENDERING — chibi isometric scene (image composite)
   ============================================================ */
// state -> sprite pose, returns {pose, flip}
function spriteFor(a,t){
  if(a.poseName && t < a.poseUntil) return {pose:a.poseName, flip:a.facing<0};
  if(a.statusKind==='sleep' && !a.walking) return {pose:'sleep', flip:false};
  if(a.fsm==='aiThink') return {pose:'think', flip:false};
  if(a.walking){
    const dir = Math.abs(a.fx)>Math.abs(a.fy) ? 'side' : (a.fy<0?'up':'down');
    return {pose:dir, flip: dir==='side' && a.fx<0};
  }
  if(a.statusKind==='working') return {pose: a.kind==='lead' ? 'idle' : 'typing', flip:false};
  if(a.statusKind==='review')  return {pose:'think', flip:false};
  return {pose:'idle', flip:false};
}
// trigger a short-lived emotive pose (e.g. happy/cheer) on an agent
function setPose(a,name,secs){ a.poseName=name; a.poseUntil=(t_now||0)+(secs||1.6); }
function drawAgentSprite(a,t){
  if(a.gy>1.05) return;            // เดินพ้นขอบล่าง (ลงบันได) แล้ว → ออกนอกเฟรม ไม่ต้องวาด
  const sp = spriteFor(a,t);
  const img = SPR[a.sprite+'-'+sp.pose] || SPR[a.sprite+'-idle'];
  const pace = a.fsm==='aiThink' ? Math.sin(t*3)*0.006 : 0;   // shimmy while thinking
  const p = iso(a.gx + pace, a.gy);
  const ar = (img && img.naturalWidth) ? img.naturalWidth/img.naturalHeight : 0.62;
  const h = U, w = U*ar;
  const bob = a.walking ? Math.abs(Math.sin(t*9))*U*0.03
            : a.statusKind==='working' ? Math.abs(Math.sin(t*7))*U*0.015
            : a.statusKind==='sleep' ? Math.sin(t*1.6)*U*0.01 : 0;
  const dx = p.x - w/2, dy = p.y - h + bob;     // feet anchored at (p.x,p.y)
  // ground shadow — NEON + glowing when this character is selected (replaces the old selection ring)
  const sel = a.id===selectedId;
  ctx.save();
  if(sel){
    const neon = '#2ff0a0';   // blue-green (same as the energy/power bar) for selection focus
    ctx.shadowColor=neon; ctx.shadowBlur=24; ctx.fillStyle=neon; ctx.globalAlpha=0.95;
    ctx.beginPath(); ctx.ellipse(p.x, p.y-U*0.02, w*0.42, U*0.08, 0, 0, 7); ctx.fill();
  } else {
    ctx.fillStyle='rgba(15,18,40,.30)';
    ctx.beginPath(); ctx.ellipse(p.x, p.y-U*0.02, w*0.34, U*0.06, 0, 0, 7); ctx.fill();
  }
  ctx.restore();
  if(!img || !img.complete || !img.naturalWidth) return;
  ctx.save();
  if(sp.flip){ ctx.translate(p.x*2,0); ctx.scale(-1,1); }
  ctx.drawImage(img, dx, dy, w, h);
  ctx.restore();
}

/* ---- floating task bubble ---- */
function drawBubble(a){
  if(meetingActive) return;
  if(a.statusKind==='sleep') return;   // sleepers show floating zzz instead
  if(a.statusKind==='habit'){          // on a break → show ONLY a random activity emoji (no text)
    const p=iso(a.gx,a.gy); const em=a.habitEmoji||'💤';
    const bob=Math.sin((t_now||0)*2.4+a.idx)*2;
    const bx=p.x, by=p.y - U*0.86 + bob, w=30, h=28;
    ctx.save(); ctx.shadowColor='rgba(0,0,0,.45)'; ctx.shadowBlur=8; ctx.fillStyle='rgba(13,19,48,.94)';
    roundRect(bx-w/2,by-h,w,h,9); ctx.fill(); ctx.restore();
    ctx.strokeStyle='#ffce6b'; ctx.lineWidth=1.3; ctx.globalAlpha=.8; roundRect(bx-w/2,by-h,w,h,9); ctx.stroke(); ctx.globalAlpha=1;
    ctx.beginPath(); ctx.moveTo(bx-5,by-2);ctx.lineTo(bx+5,by-2);ctx.lineTo(bx,by+6);ctx.closePath(); ctx.fillStyle='rgba(13,19,48,.94)'; ctx.fill();
    ctx.font='16px "Apple Color Emoji","Segoe UI Emoji",serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(em, bx, by-h/2); ctx.textAlign='left'; ctx.textBaseline='alphabetic';
    return;
  }
  if(a.fsm==='aiThink' || a.coworkBusy){   // live indeterminate "in progress" bar (model thinking OR cowork working)
    const p=iso(a.gx,a.gy), bx=p.x, by=p.y - U*0.85, col=a.coworkBusy?(a.kind==='lead'?'#41d0ff':a.kind==='coord'?'#b388ff':'#ff5db1'):'#41d0ff';
    ctx.font='bold 10px Nunito'; const w=Math.max(124, ctx.measureText(a.status).width+22), h=32;
    ctx.save(); ctx.shadowColor='rgba(0,0,0,.5)'; ctx.shadowBlur=10; ctx.fillStyle='rgba(13,19,48,.96)'; roundRect(bx-w/2,by-h,w,h,8); ctx.fill(); ctx.restore();
    ctx.strokeStyle=col; ctx.lineWidth=1.4; roundRect(bx-w/2,by-h,w,h,8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx-5,by-2);ctx.lineTo(bx+5,by-2);ctx.lineTo(bx,by+6);ctx.closePath(); ctx.fillStyle='rgba(13,19,48,.96)'; ctx.fill();
    ctx.fillStyle='#eaf0ff'; ctx.textAlign='left'; ctx.fillText(a.status, bx-w/2+10, by-h+14);
    const pbW=w-18, bx0=bx-w/2+9, bw=pbW*0.38, off=((t_now*0.6)%1)*(pbW-bw);  // indeterminate scan
    ctx.fillStyle='#0a1230'; roundRect(bx0,by-13,pbW,6,3); ctx.fill();
    ctx.save(); ctx.shadowColor=col; ctx.shadowBlur=8; ctx.fillStyle=col; roundRect(bx0+off,by-13,bw,6,3); ctx.fill(); ctx.restore();
    ctx.textAlign='left'; return;
  }
  const p=iso(a.gx,a.gy);
  const bx=p.x, by=p.y - U*0.78;
  let title, pct=null, pri=null, col='#8b95d6';
  if(a.kind==='designer' && a.task){ title=a.task.title; pct=a.progress; pri=a.task.priority; col='#ff5db1'; }
  else if(a.kind==='lead' && a.fsm==='review' && a.task){ title='Reviewing: '+a.task.title; pct=a.progress; col='#41d0ff'; }
  else if(a.kind==='coord' && (a.fsm==='report'||a.fsm==='dailyReport')){ title='Posting to Discord'; col='#b388ff'; }
  else { title=a.status; col=statusColor(a.statusKind); }

  ctx.font='bold 10px Nunito';
  const w=Math.max(94, ctx.measureText(title).width+22);
  const h = pct!=null? 38:26;
  ctx.save(); ctx.shadowColor='rgba(0,0,0,.5)'; ctx.shadowBlur=10;
  ctx.fillStyle='rgba(13,19,48,.96)'; roundRect(bx-w/2,by-h,w,h,8); ctx.fill(); ctx.restore();
  ctx.strokeStyle=col; ctx.lineWidth=1.4; ctx.globalAlpha=.85; roundRect(bx-w/2,by-h,w,h,8); ctx.stroke(); ctx.globalAlpha=1;
  // pointer
  ctx.beginPath(); ctx.moveTo(bx-5,by-2); ctx.lineTo(bx+5,by-2); ctx.lineTo(bx,by+6); ctx.closePath(); ctx.fillStyle='rgba(13,19,48,.96)'; ctx.fill();
  // priority dot
  let tx=bx-w/2+9;
  if(pri){ ctx.save();ctx.shadowColor=priColor(pri);ctx.shadowBlur=6;ctx.fillStyle=priColor(pri); ctx.beginPath(); ctx.arc(bx-w/2+11,by-h+11,4,0,7); ctx.fill(); ctx.restore(); tx=bx-w/2+20; }
  ctx.fillStyle='#eaf0ff'; ctx.textAlign='left'; ctx.font='bold 10px Nunito';
  ctx.fillText(title, tx, by-h+14);
  if(pct!=null){
    const pbW=w-18;
    ctx.fillStyle='#0a1230'; roundRect(bx-w/2+9,by-14,pbW,6,3); ctx.fill();
    ctx.save(); ctx.shadowColor=col; ctx.shadowBlur=8; ctx.fillStyle=col; roundRect(bx-w/2+9,by-14,pbW*pct/100,6,3); ctx.fill(); ctx.restore();
    ctx.fillStyle='#8b95d6'; ctx.font='bold 8px Nunito'; ctx.textAlign='right';
    ctx.fillText(Math.round(pct)+'%', bx+w/2-9, by-15);
  }
  ctx.textAlign='left';
}

/* ---- handoff / communication flow lines ---- */
function drawFlow(t){
  // designer -> lead handoff (when delivering)
  const ux=A.ux, lead=A.lead, coord=A.coord;
  if(ux.fsm==='deliverGo'||ux.fsm==='deliverWait'||ux.fsm==='deliverBack'){
    flowLine(iso(ux.gx,ux.gy), iso(lead.gx,lead.gy), '#b08bff', t, '📤');
  }
  if(reviewQueue.length>0){
    flowLine(iso(SEAT.designer.gx,SEAT.designer.gy-0.2), iso(SEAT.lead.gx,SEAT.lead.gy-0.2), '#9b8bff66', t, null);
  }
  if(lead.fsm==='review'){
    // feedback loop arc lead->designer faint
    flowLine(iso(lead.gx,lead.gy), iso(SEAT.designer.gx,SEAT.designer.gy), '#6fb3ff55', t*0.6, null);
  }
  if(coord.fsm==='report'||coord.fsm==='dailyReport'){
    flowLine(iso(coord.gx,coord.gy), iso(coord.gx+0.04,coord.gy-0.24), '#5865f2', t, '📣');
  }
  if(reportQueue.length>0){
    flowLine(iso(SEAT.lead.gx,SEAT.lead.gy-0.2), iso(SEAT.coord.gx,SEAT.coord.gy-0.2), '#54d6b066', t, null);
  }
}
function flowLine(p0,p1,color,t,emoji){
  const lift=U*0.5;
  const midx=(p0.x+p1.x)/2, midy=(p0.y+p1.y)/2-U*0.7;
  ctx.save(); ctx.shadowColor=color; ctx.shadowBlur=8;
  ctx.strokeStyle=color; ctx.lineWidth=2.4; ctx.setLineDash([6,6]); ctx.lineDashOffset=-t*18;
  ctx.beginPath(); ctx.moveTo(p0.x,p0.y-lift); ctx.quadraticCurveTo(midx,midy,p1.x,p1.y-lift); ctx.stroke();
  ctx.restore(); ctx.setLineDash([]);
  if(emoji){
    const tt=(t*0.5)%1;
    const qx=(1-tt)*(1-tt)*p0.x+2*(1-tt)*tt*midx+tt*tt*p1.x;
    const qy=(1-tt)*(1-tt)*(p0.y-lift)+2*(1-tt)*tt*midy+tt*tt*(p1.y-lift);
    ctx.font='14px Nunito'; ctx.textAlign='center'; ctx.fillText(emoji,qx,qy+5); ctx.textAlign='left';
  }
}

/* ---- floating zzz for sleeping agents (screen space, drawn on top of labels) ---- */
function drawSleepZ(a,t){
  if(a.statusKind!=='sleep' || a.walking) return;
  const p=iso(a.gx,a.gy);
  const headY = p.y - U*0.62;        // just above the character's head
  ctx.save(); ctx.textAlign='center'; ctx.shadowColor='#a06bff'; ctx.shadowBlur=12;
  for(let i=0;i<3;i++){
    const ph=((t*0.5)+i*0.33)%1;        // 0→1 rising cycle, staggered per z
    const x=p.x + 9 + i*12 + Math.sin((t*2)+i)*2;
    const y=headY - ph*38 - i*10;
    ctx.globalAlpha=Math.min(1, (1-ph)*1.4) * 0.98;   // bright most of the way, fade at the very top
    ctx.fillStyle='#efe9ff';
    ctx.font='900 '+(17+i*7)+'px Nunito';
    ctx.fillText('z', x, y);
  }
  ctx.restore(); ctx.globalAlpha=1; ctx.textAlign='left';
}

/* ---- floating "thinking…" dots while a model call is in flight ---- */
function drawThinking(a,t){
  if(a.fsm!=='aiThink' && !a.coworkBusy) return;
  const p=iso(a.gx,a.gy); const y=p.y - U*0.72;
  ctx.save(); ctx.shadowColor='#41d0ff'; ctx.shadowBlur=9;
  const active=Math.floor(t*3)%3;
  for(let i=0;i<3;i++){ ctx.globalAlpha=i===active?1:0.3; ctx.fillStyle='#9fe0ff'; ctx.beginPath(); ctx.arc(p.x-7+i*7, y, 2.6,0,7); ctx.fill(); }
  ctx.restore(); ctx.globalAlpha=1;
}

/* ---- selection is now shown via a neon ground-shadow in drawAgentSprite (no ring) ---- */

/* ---- master render: scene background image -> depth-sorted sprites -> HUD overlays ---- */
let t_now=0;
let dimLevel=0;
function render(t,dt){
  t_now=t; dt=dt||0;
  ctx.clearRect(0,0,cw,ch);
  ctx.fillStyle='#0a1024'; ctx.fillRect(0,0,cw,ch);    // letterbox backdrop
  // 1) scene background image (contain-fit)
  if(sceneImg.complete && sceneImg.naturalWidth){
    ctx.imageSmoothingEnabled=true;
    ctx.drawImage(sceneImg, sx0+panX, sy0+panY, sw, sh);
  }
  // 1b) lights-off dimmer — only AFTER everyone has walked off-frame; on at once when returning
  const allGone = agents.every(a=>a.gy>1.05);
  const dimTarget = (offDuty && allGone) ? 1 : 0;
  dimLevel += (dimTarget - dimLevel) * Math.min(1, dt*3);
  if(dimLevel>0.01){
    ctx.save();
    ctx.fillStyle='#070b1c';
    ctx.globalAlpha=0.66*dimLevel;                       // darken the room
    ctx.fillRect(sx0+panX, sy0+panY, sw, sh);
    ctx.globalCompositeOperation='multiply';             // cool down remaining light
    ctx.globalAlpha=0.30*dimLevel;
    ctx.fillStyle='#1b2c66';
    ctx.fillRect(sx0+panX, sy0+panY, sw, sh);
    ctx.restore();
  }
  // 2) depth-sorted character sprites (higher up the scene = drawn first)
  const order=[...agents].sort((a,b)=> a.gy-b.gy);
  for(const a of order) drawAgentSprite(a,t);
  // 3) HUD overlays in screen space
  if(!offDuty) drawFlow(t);
  // hide all speech bubbles / zzz / thinking when clocked out or walked off-frame
  const onStage = a => !offDuty && a.gy<=1.05;
  for(const a of agents) if(onStage(a)) drawBubble(a);
  for(const a of agents) if(onStage(a)) drawSleepZ(a,t);
  for(const a of agents) if(onStage(a)) drawThinking(a,t);
  renderMinimap();
}

/* ---- mini-map (bottom-left) — whole scene + GREEN frame = the part currently on screen ---- */
const mmcv = document.getElementById('minimap');
const mmctx = mmcv ? mmcv.getContext('2d') : null;
function renderMinimap(){
  if(!mmctx || !sceneImg.complete || !sceneImg.naturalWidth) return;
  const ar = sceneImg.naturalWidth/sceneImg.naturalHeight;
  const W=172, H=Math.round(W/ar), dpr=Math.min(2,window.devicePixelRatio||1);
  if(mmcv.width!==W*dpr || mmcv.height!==H*dpr){ mmcv.width=W*dpr; mmcv.height=H*dpr; mmcv.style.height=H+'px'; }
  mmctx.setTransform(dpr,0,0,dpr,0,0);
  mmctx.clearRect(0,0,W,H);
  mmctx.drawImage(sceneImg,0,0,W,H);
  if(dimLevel>0.01){ mmctx.fillStyle='rgba(7,11,28,'+(0.6*dimLevel)+')'; mmctx.fillRect(0,0,W,H); }
  // viewport = fraction of the image currently visible on the big canvas
  const lN=Math.max(0,-(sx0+panX)/sw), rN=Math.min(1,(cw-(sx0+panX))/sw);
  const tN=Math.max(0,-(sy0+panY)/sh), bN=Math.min(1,(ch-(sy0+panY))/sh);
  const vx=lN*W, vy=tN*H, vw=(rN-lN)*W, vh=(bN-tN)*H;
  // shade the off-screen area
  mmctx.fillStyle='rgba(0,0,0,.42)';
  mmctx.fillRect(0,0,W,vy); mmctx.fillRect(0,vy+vh,W,H-(vy+vh));
  mmctx.fillRect(0,vy,vx,vh); mmctx.fillRect(vx+vw,vy,W-(vx+vw),vh);
  // green focus frame
  mmctx.strokeStyle='#2ff0a0'; mmctx.lineWidth=2; mmctx.shadowColor='#2ff0a0'; mmctx.shadowBlur=6;
  mmctx.strokeRect(vx+1,vy+1,Math.max(2,vw-2),Math.max(2,vh-2)); mmctx.shadowBlur=0;
}

function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function shade(hex,amt){
  const n=parseInt(hex.slice(1),16); let r=(n>>16)+amt,g=((n>>8)&255)+amt,b=(n&255)+amt;
  r=Math.max(0,Math.min(255,r));g=Math.max(0,Math.min(255,g));b=Math.max(0,Math.min(255,b));
  return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

// "Resets in ..." from an ISO timestamp
function _resetIn(iso){
  if(!iso) return '';
  const ms = new Date(iso).getTime() - Date.now();
  if(ms<=0) return 'กำลังรีเซ็ต';
  const h=Math.floor(ms/3600e3), m=Math.floor((ms%3600e3)/60000);
  if(h>=24){ const d=Math.floor(h/24); return 'รีเซ็ตอีก '+d+' วัน '+(h%24)+' ชม.'; }
  return h>0 ? ('รีเซ็ตอีก '+h+' ชม. '+m+' นาที') : ('รีเซ็ตอีก '+m+' นาที');
}

function portraitInto(canvas,a){
  const c=canvas.getContext('2d'); c.imageSmoothingEnabled=true; c.clearRect(0,0,canvas.width,canvas.height);
  c.fillStyle='#0e1740'; c.fillRect(0,0,canvas.width,canvas.height);
  const img = SPR[a.sprite+'-happy'] || SPR[a.sprite+'-idle'];
  if(img && img.complete && img.naturalWidth){
    const ar=img.naturalWidth/img.naturalHeight;
    let h=canvas.height*0.92, w=h*ar;
    if(w>canvas.width*0.96){ w=canvas.width*0.96; h=w/ar; }
    c.drawImage(img, (canvas.width-w)/2, canvas.height-h-2, w, h);
  } else {
    // not loaded yet — retry shortly
    img && (img.onload = ()=>portraitInto(canvas,a));
  }
}

function drawSparkline(canvas,data){
  const c=canvas.getContext('2d'); const W=canvas.width=canvas.clientWidth*2, H=canvas.height=76; c.scale(1,1);
  c.clearRect(0,0,W,H);
  const min=Math.min(...data)-5, max=Math.max(...data)+5, rng=Math.max(1,max-min);
  c.beginPath();
  data.forEach((v,i)=>{ const x=i/(data.length-1)*W, y=H-((v-min)/rng)*(H-10)-5; i?c.lineTo(x,y):c.moveTo(x,y); });
  c.lineTo(W,H); c.lineTo(0,H); c.closePath();
  const g=c.createLinearGradient(0,0,0,H); g.addColorStop(0,'#54d6b066'); g.addColorStop(1,'#54d6b000');
  c.fillStyle=g; c.fill();
  c.beginPath();
  data.forEach((v,i)=>{ const x=i/(data.length-1)*W, y=H-((v-min)/rng)*(H-10)-5; i?c.lineTo(x,y):c.moveTo(x,y); });
  c.strokeStyle='#35b594'; c.lineWidth=3; c.stroke();
  const lv=data[data.length-1], ly=H-((lv-min)/rng)*(H-10)-5;
  c.fillStyle='#35b594'; c.beginPath(); c.arc(W-3,ly,4,0,7); c.fill();
}

/* ---- drag-to-pan the map (clamped so the scene always fills — no gaps revealed) ---- */
function clampPan(){
  const mx=Math.max(0,(sw-cw)/2), my=Math.max(0,(sh-ch)/2);
  panX=Math.max(-mx,Math.min(mx,panX)); panY=Math.max(-my,Math.min(my,panY));
}
let _drag=null, _dragMoved=false;
cv.style.cursor='grab';
cv.addEventListener('pointerdown', e=>{ _drag={x:e.clientX,y:e.clientY,px:panX,py:panY}; _dragMoved=false;
  try{cv.setPointerCapture(e.pointerId);}catch(_){} cv.style.cursor='grabbing'; });
cv.addEventListener('pointermove', e=>{ if(!_drag) return;
  const dx=e.clientX-_drag.x, dy=e.clientY-_drag.y; if(Math.hypot(dx,dy)>4) _dragMoved=true;
  panX=_drag.px+dx; panY=_drag.py+dy; clampPan(); });
function _endDrag(e){ if(!_drag) return; _drag=null; cv.style.cursor='grab'; try{cv.releasePointerCapture(e.pointerId);}catch(_){} }
cv.addEventListener('pointerup',_endDrag); cv.addEventListener('pointercancel',_endDrag);
cv.addEventListener('click', e=>handleClick(e));
function handleClick(e){
  if(_dragMoved) return;   // it was a drag, not a tap → don't select
  const r=cv.getBoundingClientRect(); const mx=e.clientX-r.left, my=e.clientY-r.top;
  let best=null,bd=1e9;
  for(const a of agents){ const p=iso(a.gx,a.gy); const d=Math.hypot(p.x-mx,p.y-my); if(d<U*0.6&&d<bd){bd=d;best=a;} }
  if(best){ selectedId=best.id; activeTab='detail'; setTab(); renderRight(); renderAgentList();
    const hint=document.getElementById('hint'); hint.style.display='none';
    openProfile(best.id); }   // pop the character's profile + skills
}

// restore clock-in/out state across refresh · ถ้าจำไม่ได้ (ครั้งแรก) เริ่มต้นจาก "เลิกงาน"

let last=performance.now(), uiAcc=0;
function step(now, dt){
  if(cw===0 || Math.abs(cv.parentElement.clientWidth-cw)>1) resize();
  tick(dt);
  render(now/1000, dt);
  uiAcc+=dt;
  if(uiAcc>0.25){ uiAcc=0;
    renderKPIs(); renderHealth(); renderClock(); renderAgentList();
    renderRight();
  }
}
// rAF: smooth rendering while the tab is VISIBLE
function loop(now){
  if(!document.hidden){ const dt=Math.min(0.05,(now-last)/1000); last=now; step(now,dt); }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
// setInterval: keeps the sim ALIVE while the tab is hidden/unfocused (rAF is paused there).
// Timers still fire in background (throttled), so agents keep working and the view is
// up-to-date the moment you switch back — no more freezing mid-task.
setInterval(()=>{
  if(document.hidden){ const now=performance.now(); const dt=Math.min(0.5,(now-last)/1000); last=now; step(now,dt); }
}, 250);
